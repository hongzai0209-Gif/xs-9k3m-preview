<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --serif:"Songti SC",STSong,SimSun,"Noto Serif SC",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
    /* 客人 · 奢华 */
    --bg:#F7F3EA;--card:#FFFDF9;--line:#E3DBCB;--gold:#9A6B24;--ink:#1E1A16;--dim:#8A8175;
    --dark:#181410;--heroBg:#0B0907;--btn:#D9A24B;--btnInk:#181410;
    --soldBg:#F0EBE0;--soldInk:#B5AD9E;--tipBg:#FBF1DF;--tipLine:#EDDBB6;--tipInk:#8A5B1E;
    --low:#B07818;--ok:#4C7020;
    /* 内部 · 干活 */
    --obg:#EFEEEB;--ocard:#FFFFFF;--oline:#E2E1DC;--oline2:#EFEEEA;
    --oink:#16150F;--odim:#6E6C64;--ohd:#1C1A16;
    --green:#2A7A4B;--greenbg:#E9F4EE;--greenln:#BEDFC9;
    --amber:#A9670A;--amberbg:#FCF4E5;--amberln:#EBDCB6;
    --red:#B0302A;--redbg:#FBECEB;--redln:#EBC7C4;
    --terra:#C8551F;--slate:#3F566E;
  }
  body{font-family:var(--sans);-webkit-font-smoothing:antialiased;background:#DEDDD9;color:var(--ink)}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--obg);position:relative;overflow-x:hidden}
  .app.lux{background:var(--bg)}
  .view{display:none}.view.on{display:block}
  .fig{font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .cur{font-size:.6em;font-weight:400;color:var(--odim);margin-right:3px;letter-spacing:0}

  .off{max-width:430px;margin:0 auto;padding:7px 14px;text-align:center;font:500 11px/1.4 var(--sans);background:#E6E5E1;color:#87857E}
  .off.ok{background:var(--greenbg);color:var(--green)}
  .off.no{background:var(--amberbg);color:var(--amber)}
  .demo{max-width:430px;margin:0 auto;background:#fff;padding:9px 14px;display:flex;gap:18px;justify-content:center}
  .demo button{border:0;background:0;font:500 11px/1 var(--sans);letter-spacing:2px;color:#ABA59B;cursor:pointer;padding:6px 2px;border-bottom:1px solid transparent}
  .demo button.on{color:#16150F;border-bottom-color:#16150F}

  /* ══════ 客人页 ══════ */
  .hero{position:relative;height:340px;overflow:hidden;background:var(--heroBg)}
  .shot{position:absolute;inset:0;background:center/cover no-repeat;opacity:.94}
  .glow{position:absolute;inset:0;background:radial-gradient(150% 115% at 50% 14%,transparent,var(--heroBg));opacity:.6}
  .fade{position:absolute;left:0;right:0;bottom:0;height:50%;background:linear-gradient(to top,var(--heroBg) 6%,transparent)}
  .mark{position:absolute;top:20px;left:20px;display:flex;align-items:center;gap:9px;z-index:3}
  .seal{width:30px;height:30px;border:.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
  .marktx{font:400 10px/1 var(--sans);letter-spacing:4px;color:var(--gold)}
  .lang{position:absolute;top:20px;right:20px;z-index:4;display:flex;border:.5px solid rgba(255,255,255,.26)}
  .lang button{min-width:40px;height:30px;border:0;background:rgba(0,0,0,.32);color:rgba(255,255,255,.72);font:400 11px/1 var(--sans);cursor:pointer}
  .lang button.on{background:var(--btn);color:var(--btnInk)}
  .cap{position:absolute;left:20px;right:20px;bottom:24px;z-index:3}
  .cap h1{font-family:var(--serif);font-weight:400;color:#fff;font-size:36px;letter-spacing:.2em;text-indent:.2em;line-height:1.05}
  .cap h1.en{font-size:26px;letter-spacing:.08em;text-indent:.08em}
  .hr{width:26px;height:.5px;background:var(--gold);margin:15px 0 11px}
  .cap p{font:400 10px/1.8 var(--sans);letter-spacing:2.5px;color:var(--gold)}
  .lb2{padding:20px}
  .sexrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .sx{min-height:52px;border:.5px solid var(--line);background:var(--card);color:var(--dim);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font:400 14px/1 var(--sans);transition:.2s}
  .sx.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sx svg{opacity:.55}.sx.on svg{opacity:1}
  .sku{border:.5px solid var(--line);background:var(--card);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .sku.on{border:1px solid var(--gold)}
  .sku.out{background:var(--soldBg);cursor:default}
  .snm{font:400 16px/1.3 var(--sans);max-width:210px}
  .swt{font:400 11px/1 var(--mono);letter-spacing:2px;color:var(--dim);margin-top:6px}
  .sst{font:400 11px/1 var(--sans);margin-top:6px}
  .spr{font-family:var(--serif);font-size:25px;text-align:right;color:var(--gold);line-height:1}
  .spr sup{font-family:var(--sans);font-size:11px;vertical-align:.35em;margin-right:3px;color:var(--dim)}
  .shint{font:400 10px/1 var(--sans);color:var(--dim);text-align:right;margin-top:9px}
  .sku.out .snm,.sku.out .swt,.sku.out .sst,.sku.out .spr,.sku.out .spr sup{color:var(--soldInk)}
  .sku.out .spr{text-decoration:line-through}
  .stp{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:10px}
  .stp button{width:32px;height:32px;border:.5px solid var(--line);background:0;color:var(--gold);font:300 17px/1 var(--sans);cursor:pointer}
  .stp button.p{background:var(--gold);color:var(--card);border-color:var(--gold)}
  .stp span{font-family:var(--serif);font-size:18px;min-width:18px;text-align:center}
  .ctip{border:.5px solid var(--tipLine);background:var(--tipBg);color:var(--tipInk);padding:13px;text-align:center;font:400 11px/1 var(--sans);letter-spacing:1.5px}
  .lfoot{position:sticky;bottom:0;z-index:10;background:var(--dark);padding:16px 20px;display:flex;align-items:flex-end;justify-content:space-between}
  .llb{font:400 10px/1 var(--sans);letter-spacing:1.5px;color:rgba(255,255,255,.5);margin-bottom:8px}
  .ltot{font-family:var(--serif);font-size:28px;color:#fff;line-height:1}
  .ltot sup{font-family:var(--sans);font-size:12px;vertical-align:.36em;margin-right:4px;color:rgba(255,255,255,.55)}
  .cta{min-height:48px;padding:0 22px;border:.5px solid var(--btn);background:0;color:var(--btn);font:400 13px/1 var(--sans);letter-spacing:2px;cursor:pointer;white-space:nowrap}
  .cta.on{background:var(--btn);color:var(--btnInk)}
  .cta:disabled{opacity:.32;cursor:default}
  .lhd{background:var(--dark);padding:16px 20px;display:flex;align-items:center}
  .lhd .t{font-family:var(--serif);font-size:19px;color:#fff;letter-spacing:.1em}
  .lhd .s{font:400 10px/1.6 var(--sans);letter-spacing:2px;color:var(--gold);margin-top:3px}
  .bk{border:0;background:0;color:var(--gold);font-size:19px;cursor:pointer;padding:0 12px 0 0;line-height:1}
  .fld{margin-bottom:18px}
  .fld label{display:block;font:400 10px/1 var(--sans);letter-spacing:2px;color:var(--dim);margin-bottom:8px}
  .fld input,.fld select,.fld textarea{width:100%;min-height:48px;padding:13px 14px;border:.5px solid var(--line);background:var(--card);font:400 15px var(--sans);color:var(--ink);border-radius:0;-webkit-appearance:none}
  .fld textarea{min-height:66px;resize:none}
  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .day{min-height:56px;border:.5px solid var(--line);background:var(--card);cursor:pointer;font:400 13px/1.4 var(--sans);color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .day small{font-size:10px;color:var(--dim);margin-top:3px}
  .day.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .day.on small{color:rgba(255,255,255,.6)}
  .tk{text-align:center;padding:34px 20px 20px}
  .tk .k{font:400 10px/1 var(--sans);letter-spacing:4px;color:var(--dim)}
  .tk .n{font-family:var(--serif);font-size:72px;color:var(--gold);line-height:1;margin:8px 0 14px}
  .tk .pay{display:inline-block;border:.5px solid var(--tipLine);background:var(--tipBg);color:var(--tipInk);padding:10px 18px;font:400 12px/1 var(--sans)}
  .tk .pay b{font-family:var(--serif);font-size:16px;font-weight:400;margin-left:6px}
  .rc{margin:0 20px;border:.5px solid var(--line);background:var(--card);padding:16px}
  .rc .r{display:flex;justify-content:space-between;font:400 13px var(--sans);padding:5px 0}
  .rc .r b{font-family:var(--serif);font-size:15px;font-weight:400}
  .rc .dv{border-top:.5px solid var(--line);margin:9px 0}
  .rc .ad{font:400 12px/1.85 var(--sans)}
  .rc .ad .k{font:400 10px/1 var(--sans);letter-spacing:2px;color:var(--dim);display:block;margin:9px 0 4px}
  .cwait{margin:16px 20px 30px;background:var(--soldBg);padding:14px;display:flex;align-items:center;gap:11px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--btn);flex-shrink:0;animation:br 1.8s ease-in-out infinite}
  @keyframes br{0%,100%{opacity:1}50%{opacity:.2}}
  @media(prefers-reduced-motion:reduce){.dot{animation:none}}
  .cwait p{font:400 12px/1.6 var(--sans);color:var(--dim)}
  .lnk{border:0;background:0;color:var(--gold);font:400 12px var(--sans);text-decoration:underline;cursor:pointer;padding:4px}

  /* ══════ 内部 · 干活 ══════ */
  /* ── 圆角 ── */
  .oc,.ord,.fold,.tb,.rows,.cust,.stl,.rk,.big4,.trc,.cells,.seg,.calc,.fix,.warn,.gp,.day2{border-radius:14px;overflow:hidden}
  .b1,.b2,.b3,.bg,.chip,.aged,.pill{border-radius:10px}
  .fi input,.fi select{border-radius:10px}
  .filt button,.carr button{border-radius:10px}
  .pg,.pg i,.rk .bar,.rk .bar i,.mix .bar,.mix .bar i,.pln .bar,.pln .bar i{border-radius:5px}
  .cell{border-radius:0}
  .onav{border-radius:0}
  .qrb{border-radius:10px}
  .ops{color:var(--oink)}
  .ohd{background:var(--ohd);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ohd .l{display:flex;align-items:center;gap:10px;min-width:0}
  .ohd .t{font:600 19px/1.2 var(--sans);color:#fff}
  .ohd .s{font:400 12px/1.4 var(--sans);color:rgba(255,255,255,.55);margin-top:3px}
  .ohd .obk{border:0;background:0;color:#fff;font-size:22px;cursor:pointer;padding:0 4px 0 0;line-height:1}
  .lg{display:flex;border:1px solid rgba(255,255,255,.22);flex-shrink:0}
  .lg button{min-width:36px;height:28px;border:0;background:0;color:rgba(255,255,255,.6);font:500 11px/1 var(--sans);cursor:pointer}
  .lg button.on{background:#fff;color:var(--ohd)}
  .pip{background:var(--terra);color:#fff;font:700 14px/1 var(--sans);min-width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:0 8px;flex-shrink:0}
  .ob{padding:16px}
  .oc{background:var(--ocard);border:1px solid var(--oline);padding:18px;margin-bottom:12px}
  .ttl{font:600 12px/1 var(--sans);color:var(--odim);margin-bottom:14px}
  .b1{min-height:44px;padding:0 16px;border:0;background:var(--ohd);color:#fff;font:600 14px/1 var(--sans);cursor:pointer}
  .b2{min-height:44px;padding:0 16px;border:1px solid var(--oline);background:var(--ocard);color:var(--oink);font:500 14px/1 var(--sans);cursor:pointer}
  .b3{min-height:44px;padding:0 14px;border:1px solid var(--redln);background:var(--redbg);color:var(--red);font:600 13px/1 var(--sans);cursor:pointer}
  .bg{min-height:60px;width:100%;border:0;background:var(--green);color:#fff;font:600 18px/1 var(--sans);cursor:pointer}
  .bg:active{opacity:.85}
  .full{width:100%}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* 订单卡 */
  .ord{background:var(--ocard);border:1px solid var(--oline);margin-bottom:12px}
  .obd{padding:12px 18px;font:600 14px/1 var(--sans);letter-spacing:.8px;color:#fff;display:flex;align-items:center;justify-content:space-between}
  .obd i{font-style:normal;font-size:12px;font-weight:500;opacity:.8;font-variant-numeric:tabular-nums}
  .obd.s-pend{background:var(--amber)}
  .obd.s-paid{background:var(--terra)}
  .obd.s-ship{background:var(--slate)}
  .obd.s-done{background:var(--green)}
  .oin{padding:16px 18px}
  .or1{display:flex;align-items:baseline;justify-content:space-between}
  .ono{font:700 22px/1 var(--sans);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .osh{font:400 13px/1 var(--sans);color:var(--odim);margin-left:9px}
  .oam{font:700 20px/1 var(--sans);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .oit{font:500 15px/1.5 var(--sans);margin-top:11px}
  .owh{font:400 13px/1.7 var(--sans);color:var(--odim);margin-top:6px}
  .oln{border-top:1px solid var(--oline2);margin-top:14px;padding-top:14px;display:flex;justify-content:flex-end;gap:8px}
  .fee{background:#F7F7F5;border:1px solid var(--oline2);padding:10px 12px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
  .fee span{font:400 12px/1.4 var(--sans);color:var(--odim)}
  .fee em{font:700 15px/1 var(--sans);font-variant-numeric:tabular-nums;font-style:normal}
  .fee em.neg{color:var(--red)}

  /* 折叠行 */
  .fold{background:var(--ocard);border:1px solid var(--oline);margin-bottom:10px;overflow:hidden}
  .fhd{padding:15px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
  .fhd .a{font:600 16px/1.3 var(--sans)}
  .fhd .b{font:400 12px/1.5 var(--sans);color:var(--odim);margin-top:4px}
  .fhd .r{text-align:right;flex-shrink:0}
  .fhd .r .v{font:700 20px/1 var(--sans);font-variant-numeric:tabular-nums;letter-spacing:-.4px}
  .fhd .r .k{font:400 11px/1 var(--sans);color:var(--odim);margin-top:5px}
  .chev{font:400 15px/1 var(--sans);color:#B4B2AA;flex-shrink:0;transition:transform .18s}
  .fold.open .chev{transform:rotate(90deg)}
  .fbd{border-top:1px solid var(--oline2);padding:16px 18px;background:#FBFBFA}
  .fold:not(.open) .fbd{display:none}
  .fold.gr .fhd{background:var(--greenbg)}
  .fold.gr .fhd .a{color:var(--green)}

  /* 数据格 */
  .cells{display:grid;gap:1px;background:var(--oline);border:1px solid var(--oline)}
  .cells.c2{grid-template-columns:1fr 1fr}
  .cells.c3{grid-template-columns:repeat(3,1fr)}
  .cell{background:var(--ocard);padding:13px 14px}
  .cell .k{font:400 11px/1.3 var(--sans);color:var(--odim)}
  .cell .v{font:700 21px/1 var(--sans);font-variant-numeric:tabular-nums;margin-top:8px;letter-spacing:-.5px}
  .cell .v small{font:400 12px var(--sans);color:var(--odim);margin-left:3px;letter-spacing:0}
  .cell.gr{background:var(--greenbg)}.cell.gr .k{color:var(--green)}.cell.gr .v{color:var(--green)}
  .cell.am{background:var(--amberbg)}.cell.am .k{color:var(--amber)}.cell.am .v{color:var(--amber)}
  .cell.rd{background:var(--redbg)}.cell.rd .k{color:var(--red)}.cell.rd .v{color:var(--red)}

  .rows{border:1px solid var(--oline);background:var(--ocard)}
  .rw{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--oline2);font:400 14px var(--sans)}
  .rw:last-child{border-bottom:0}
  .rw em{font:600 15px var(--sans);font-variant-numeric:tabular-nums;font-style:normal}
  .rw .sub{font:400 12px/1.5 var(--sans);color:var(--odim);margin-top:3px}

  /* 输入 */
  .fi{margin-bottom:14px}
  .fi label{display:block;font:500 13px/1 var(--sans);color:var(--odim);margin-bottom:7px}
  .fi input,.fi select{width:100%;min-height:52px;padding:0 14px;border:1px solid var(--oline);background:var(--ocard);font:600 17px var(--sans);font-variant-numeric:tabular-nums;color:var(--oink);border-radius:0;-webkit-appearance:none}
  .fi input:focus,.fi select:focus{outline:0;border:2px solid var(--ohd)}
  .fi.key label{color:var(--red)}
  .fi.key input{border:2px solid var(--red)}

function calc(o){
  var p=px(o.shop,o.sku), fee=o.q>=FREE?0:ZONE[o.zone].fee;
  var goods=p.sell*o.q, due=p.settle*o.q+fee;
  return {goods:goods,fee:fee,amt:goods+fee,due:due,earn:goods+fee-due};
}

function csku(){return SKU.filter(function(s){return s.k===csex;});}
function ctot(){
 var list=csku(), s=cpick!==null?list[cpick]:null;
 if(!s) return {s:null,goods:0,fee:0,amt:0};
 var p=px(0,s.id), goods=p.sell*cqty, fee=cqty>=FREE?0:(cqty?ZONE[czone].fee:0);
 return {s:s,goods:goods,fee:fee,amt:goods+fee};
}
function submitOrder(){
 var k=ctot(); if(!k.s||!cqty) return;
 SEQ++; var no='A'+SEQ;
 var o={no:no,st:0,shop:0,sku:k.s.id,q:cqty,zone:czone,
   who:$('I-nm').value||'—',tel:$('I-tel').value||'—',
   ad:($('I-ad').value||'—').replace(/,\s*/g,',|').replace(/\|$/,''),
   day:[14,15,16][cday],batch:'—',ts:Date.now()};
 k.s.hold+=cqty;              /* 预留库存 */
 ORD.unshift(o);
 $('c3n').textContent=no;
 go('c3');
}
function confirmPay(no){
 for(var i=0;i<ORD.length;i++){ var o=ORD[i];
  if(o.no!==no) continue;
  var s=sku(o.sku);
  if(s.stock-o.q<0){ toast(T().soldout); s.hold=Math.max(0,s.hold-o.q); o.st=-1; draw(); return; }
  s.hold=Math.max(0,s.hold-o.q); s.stock-=o.q;   /* 预留 -> 正式扣减 */
  o.st=1; o.confirmed=true;
  toast(T().done+' · '+no); draw(); return;
 }
}

function storeDue(id){

 return base+extra;

function QR(seed){
 var n=21,s=4,h=7;
 for(var i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))>>>0;
 function r(){h=(h*1103515245+12345)>>>0;return (h>>>17)&1;}
 var m='';
 for(var y=0;y<n;y++)for(var x=0;x<n;x++){
  if((x<8&&y<8)||(x>n-9&&y<8)||(x<8&&y>n-9))continue;
  if(r()) m+='<rect x="'+(x*s)+'" y="'+(y*s)+'" width="'+s+'" height="'+s+'"/>';}
 function F(x,y){var a=x*s,b=y*s;
  return '<rect x="'+a+'" y="'+b+'" width="'+(7*s)+'" height="'+(7*s)+'"/>'+
   '<rect x="'+(a+s)+'" y="'+(b+s)+'" width="'+(5*s)+'" height="'+(5*s)+'" fill="#fff"/>'+
   '<rect x="'+(a+2*s)+'" y="'+(b+2*s)+'" width="'+(3*s)+'" height="'+(3*s)+'" fill="#16150F"/>';}
 return '<svg viewBox="0 0 '+(n*s)+' '+(n*s)+'" width="76" height="76" shape-rendering="crispEdges" fill="#16150F">'+
  '<rect width="'+(n*s)+'" height="'+(n*s)+'" fill="#fff"/>'+m+F(0,0)+F(n-7,0)+F(0,n-7)+'</svg>';
}
